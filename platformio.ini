; PlatformIO Project Configuration File

[env:cardputer]
platform = espressif32
board = m5stack-stamps3
framework = arduino

; Habilita el USB CDC al iniciar (necesario para ESP32-S3)
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1

; Velocidad del monitor serie
monitor_speed = 115200

; Librerías oficiales necesarias para Cardputer
lib_deps =
    m5stack/M5Cardputer
    m5stack/M5Unified
    m5stack/M5GFX
